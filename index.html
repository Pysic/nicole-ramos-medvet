  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "mainEntity": [
      {
        "@type": "Question",
        "name": "Como funciona o atendimento veterinário a domicílio?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A Dra. Nicole Ramos vai até a sua casa com todo o equipamento necessário para realizar consultas, vacinas, coleta de exames e outros procedimentos. Basta agendar pelo WhatsApp ou formulário no site e combinar o melhor horário."
        }
      },
      {
        "@type": "Question",
        "name": "Quais regiões de São Paulo são atendidas?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O atendimento veterinário a domicílio da Dra. Nicole Ramos cobre diversas regiões de São Paulo. Entre em contato para confirmar a disponibilidade para o seu bairro."
        }
      },
      {
        "@type": "Question",
        "name": "O atendimento em casa serve para cachorros e gatos?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sim! A Dra. Nicole Ramos atende tanto cães quanto gatos a domicílio em São Paulo, incluindo consultas de rotina, vacinação, check-up e cuidados paliativos."
        }
      },
      {
        "@type": "Question",
        "name": "O que é o serviço de cat sitter veterinário?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O cat sitter é um serviço de cuidados para gatos realizado por uma médica veterinária. Inclui visitas à sua casa para alimentar, brincar, administrar medicamentos se necessário e monitorar a saúde do seu felino enquanto você viaja ou trabalha."
        }
      },
      {
        "@type": "Question",
        "name": "Como agendar uma consulta veterinária em domicílio?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O agendamento pode ser feito pelo WhatsApp ou pelo formulário de contato no site. Informe seu endereço, o nome e espécie do pet, e o motivo da consulta para que possamos organizar a visita."
        }
      },
      {
        "@type": "Question",
        "name": "Por que escolher atendimento veterinário em casa em vez de clínica?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O atendimento em casa reduz o estresse do animal, evita exposição a outros pets doentes, proporciona um ambiente familiar e mais tranquilo para o pet, e é extremamente conveniente para tutores com rotina agitada ou pets com dificuldade de locomoção."
        }
      }
    ]
  }

<body>

  <div id="footer-root"></div>

  <!-- Scripts -->
  <script type="module">
    async function loadPartial(rootId, path) {
      const root = document.getElementById(rootId);
      const res  = await fetch(path);
      root.innerHTML = await res.text();
    }

    await Promise.all([
      loadPartial('navbar-root',   'sections/navbar.html'),
      loadPartial('hero-root',     'sections/hero.html'),
      loadPartial('services-root', 'sections/services.html'),
      loadPartial('catsitter-root','sections/catsitter.html'),
      loadPartial('cases-root',    'sections/cases.html'),
      loadPartial('faq-root',      'sections/faq.html'),
      loadPartial('footer-root',   'sections/footer.html'),
    ]);

    const { initNavbar } = await import('./js/navbar.js');
    const { initReveal } = await import('./js/reveal.js');
    const { initFaq }    = await import('./js/faq.js');
    initNavbar();
    initReveal();
    initFaq();
  </script>
</body>
